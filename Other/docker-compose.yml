services:
    db:
        image: postgres:18
        pull_policy: always
        container_name: profin-db
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql
    
    api:
        build:
            context: ./backend/ProjectFinder
            dockerfile: Dockerfile
        container_name: profin-api
        restart: unless-stopped
        env_file:
            - .env
        environment:
            ASPNETCORE_ENVIRONMENT: Production
            ASPNETCORE_URLS: http://+:8080
            ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
            JWTSecurity__Key: ${JWT_SECRET}
        depends_on:
            - db
    
    frontend:
        build:
            context: ./frontend/project-finder
            dockerfile: Dockerfile
            args:
                TALTECH_NPM_TOKEN: ${TALTECH_NPM_TOKEN}
                NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        container_name: profin-frontend
        restart: unless-stopped
        env_file:
            - .env
        environment:
            NODE_ENV: production
            NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        depends_on:
            - api
    
    nginx:
        image: nginx:stable-alpine
        container_name: profin-nginx
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            - ./certbot/www:/var/www/certbot:ro
            - ./certbot/conf:/etc/letsencrypt:ro
        depends_on:
            - frontend
            - api
            
    certbot:
        image: certbot/certbot
        container_name: profin-certbot
        volumes:
            - ./certbot/www:/var/www/certbot
            - ./certbot/conf:/etc/letsencrypt

volumes:
    postgres_data: